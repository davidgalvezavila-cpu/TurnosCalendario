name: Compilar APK de depuración

# Se ejecuta automáticamente al subir código a "main", o manualmente desde
# la pestaña "Actions" del repositorio (botón "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compilar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # No hace falta gradlew: esta acción instala Gradle directamente
      # en el runner, así que no necesitamos el binario gradle-wrapper.jar.
      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK de depuración
        run: gradle assembleDebug --stacktrace

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: TurnosCalendario-debug
          path: app/build/outputs/apk/debug/app-debug.apk
